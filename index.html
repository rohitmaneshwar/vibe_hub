<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Play Rohit's Ultimate Trivia Game! 10 Levels of secure brain challenges.">
    <title>Rohit's Arcade - Trivia Realm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #020617 0%, #090d16 100%);
            --game-neon: #a855f7;
            --game-green: #22c55e;
            --game-red: #ef4444;
            --card-bg: rgba(15, 23, 42, 0.7);
            --card-border: rgba(168, 85, 247, 0.25);
            --text-main: #f8fafc;
        }

        /* SECURE SCREEN & CAPTURE PROTECTION */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
        }

        body {
            background: var(--bg-gradient); color: var(--text-main);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            padding: 20px; overflow-x: hidden; position: relative;
            transition: filter 0.3s ease;
        }

        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        /* --- CHARACTER CREATION OVERLAY --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(20px);
            display: flex; justify-content: center; align-items: center; z-index: 9999; padding: 20px;
        }
        .login-card {
            background: rgba(15, 23, 42, 0.85); border: 2px solid var(--game-neon);
            padding: 35px 25px; border-radius: 28px; width: 100%; max-width: 390px;
            text-align: center; box-shadow: 0 0 35px rgba(168, 85, 247, 0.3);
        }
        .login-card h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; margin-bottom: 8px; }
        .name-input {
            width: 100%; background: rgba(0,0,0,0.5); border: 2px solid var(--card-border);
            padding: 16px; border-radius: 16px; color: white; font-size: 1rem; font-weight: 600;
            outline: none; text-align: center; margin: 20px 0; transition: 0.3s;
        }
        .name-input:focus { border-color: var(--game-neon); box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }
        .start-game-btn {
            width: 100%; background: linear-gradient(90deg, #a855f7, #ec4899);
            color: white; border: none; padding: 16px; border-radius: 16px;
            font-size: 0.95rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }

        /* --- MAIN CONTAINER --- */
        .container { width: 100%; max-width: 430px; z-index: 10; display: none; }

        /* HUD Status System */
        .hud-bar {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; margin-bottom: 15px; background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--card-border); padding: 12px 15px; border-radius: 16px;
        }
        .live-status { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: 700; }
        .pulse-dot { width: 8px; height: 8px; background: var(--game-green); border-radius: 50%; box-shadow: 0 0 10px var(--game-green); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(0.9); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 1; } }
        .hud-level-tag { background: var(--game-neon); color: white; padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; }

        /* Profile RPG Layout */
        .profile-card {
            background: var(--card-bg); border: 2px solid var(--card-border);
            border-radius: 24px; padding: 15px 20px; margin-bottom: 15px;
            display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .avatar { width: 70px; height: 70px; border-radius: 14px; border: 2px solid var(--game-neon); object-fit: cover; }
        .char-stats { flex-grow: 1; }
        .char-stats h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; }
        
        .stat-bar-container { width: 100%; background: #1e293b; height: 6px; border-radius: 3px; margin-top: 5px; overflow: hidden; }
        .stat-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #a855f7, #ec4899); transition: width 0.3s; }

        /* Arcade 15s Timer Progress Bar */
        #timer-container { width: 100%; background: rgba(0,0,0,0.5); height: 6px; border-radius: 3px; margin-bottom: 15px; overflow: hidden; display: none; border: 1px solid rgba(255,255,255,0.05); }
        #timer-fill { height: 100%; width: 100%; background: var(--game-red); }

        /* Categories Select Matrix */
        .category-matrix { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 15px; }
        .cat-btn {
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--card-border);
            border-radius: 12px; padding: 8px 2px; font-size: 1.1rem; text-align: center; opacity: 0.4; pointer-events: none; transition: 0.3s;
        }
        .cat-btn span { display: block; font-size: 0.55rem; font-weight: 700; color: #94a3b8; margin-top: 2px; }
        .cat-btn.active { opacity: 1; background: rgba(168, 85, 247, 0.15); border-color: var(--game-neon); }
        .cat-btn.active span { color: white; }

        /* Protected Question Area */
        .widget {
            background: var(--card-bg); border: 2px solid var(--card-border);
            border-radius: 24px; padding: 20px; margin-bottom: 15px; position: relative;
        }
        .widget-title { font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 700; margin-bottom: 12px; display: flex; justify-content: space-between; }
        .attempt-badge { font-size: 0.7rem; color: #f59e0b; background: rgba(245, 158, 11, 0.1); padding: 2px 8px; border-radius: 6px; border: 1px solid rgba(245, 158, 11, 0.2); font-weight: bold; }
        
        .quote-capture-area {
            background: #0f172a; border-radius: 16px; padding: 20px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05); min-height: 110px;
            display: flex; flex-direction: column; justify-content: center;
        }
        .quote-box { color: #f8fafc; font-size: 1rem; font-weight: 700; line-height: 1.6; }
        .quote-box span.blank-space { color: #f59e0b; text-decoration: underline; font-weight: 800; }

        /* 4 Arcade Option Buttons */
        .puzzle-options-box { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        .puzzle-opt-btn {
            background: rgba(0, 0, 0, 0.4); border: 1px solid var(--card-border);
            color: white; padding: 14px; border-radius: 14px; font-weight: 700; font-size: 0.85rem;
            cursor: pointer; text-align: left; padding-left: 15px; display: flex; justify-content: space-between;
        }
        .puzzle-opt-btn.correct { background: rgba(34, 197, 94, 0.2) !important; border-color: var(--game-green) !important; color: var(--game-green); }
        .puzzle-opt-btn.wrong { background: rgba(239, 68, 68, 0.2) !important; border-color: var(--game-red) !important; color: var(--game-red); animation: shake 0.3s ease; }

        .quote-actions { display: flex; gap: 10px; margin-top: 15px; }
        .action-sub-btn {
            flex: 1; background: rgba(255, 255, 255, 0.02); border: 2px solid var(--card-border);
            color: #cbd5e1; padding: 12px; font-size: 0.75rem; font-weight: 700; border-radius: 14px;
            cursor: pointer; text-transform: uppercase; display: flex; justify-content: center; align-items: center; gap: 5px;
        }

        .ping-btn {
            width: 100%; background: linear-gradient(90deg, #a855f7, #ec4899); border: none;
            padding: 16px; border-radius: 16px; color: white; font-weight: 700; font-size: 0.9rem;
            cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px;
        }

        /* Level Up Modals */
        .level-up-splash {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
            background: rgba(0, 0, 0, 0.95); border: 3px solid var(--game-green); padding: 25px 45px;
            border-radius: 20px; color: var(--game-green); font-family: 'Space Grotesk', sans-serif;
            font-size: 1.6rem; font-weight: 700; text-transform: uppercase; box-shadow: 0 0 50px rgba(34, 197, 94, 0.6); pointer-events: none; z-index: 9999; opacity: 0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center;
        }
        .level-up-splash.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .confetti { position: absolute; width: 6px; height: 6px; z-index: 1000; border-radius: 50%; animation: poof 0.8s ease-out forwards; }
        @keyframes poof { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; } }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>
    <audio id="lofi-player" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <div class="level-up-splash" id="lvl-splash">LEVEL UP! ⚡</div>

    <div id="login-overlay">
        <div class="login-card">
            <h2>Trivia Dungeon 🎮</h2>
            <p>अपना नाम डालें और 10 Levels की पहेली को स्टार्ट करें</p>
            <input type="text" id="username-field" class="name-input" placeholder="Enter Avatar Name..." maxlength="12">
            <button class="start-game-btn" onclick="initPlayerSession()">Launch Game</button>
        </div>
    </div>

    <div class="container" id="main-gameboard">
        
        <div class="hud-bar">
            <div class="live-status"><div class="pulse-dot"></div><span id="live-greeting">SYS: ONLINE</span></div>
            <div class="hud-level-tag" id="lvl-tag">LEVEL 1</div>
        </div>
        
        <div class="profile-card">
            <img src="my_photo.jpg" alt="Avatar" class="avatar" id="profile-img">
            <div class="char-stats">
                <h1 id="player-display-name">Player</h1>
                <div style="display: flex; justify-content: space-between; font-size: 0.6rem; font-weight: 700; color: #a0aec0; margin-top: 5px;">
                    <span id="quest-track-label">QUEST: 1 / 5</span>
                    <span id="exp-text">0/100 XP</span>
                </div>
                <div class="stat-bar-container"><div class="stat-bar-fill" id="exp-fill" style="width: 0%"></div></div>
            </div>
        </div>

        <div id="timer-container"><div id="timer-fill"></div></div>

        <div class="category-matrix">
            <div class="cat-btn" id="cat-sports">⚽<span>Sports</span></div>
            <div class="cat-btn" id="cat-english">🔤<span>English</span></div>
            <div class="cat-btn" id="cat-gk">🌍<span>GK</span></div>
            <div class="cat-btn" id="cat-reasoning">🧠<span>Logic</span></div>
            <div class="cat-btn" id="cat-nature">🍃<span>Nature</span></div>
        </div>

        <div class="widget">
            <div class="widget-title">
                <span>🛡️ Challenge Quest</span>
                <span class="attempt-badge" id="attempt-tracker">Lifelines: 2</span>
            </div>
            
            <div class="quote-capture-area" id="capture-node">
                <div class="quote-box" id="puzzle-quote-text">Dungeon Loading...</div>
                <div class="quote-author" style="display:none;"></div>
            </div>

            <div class="puzzle-options-box" id="options-container"></div>

            <div class="quote-actions">
                <button class="action-sub-btn" id="next-quote-btn">🎲 Skip / Roll</button>
                <button class="action-sub-btn" id="download-btn" style="border-color: rgba(236,72,153,0.4); color:#f472b6;">📸 Save Card</button>
            </div>
        </div>

        <button class="ping-btn" id="ping-me">⚡ Claim Realm Reward</button>
    </div>

    <script>
        // ANTI-COPY & CONTROLS INTERCEPTIONS
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('copy', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83 || e.keyCode == 67))) {
                e.preventDefault(); return false;
            }
        });

        // SCREEN BLUR HANDLER
        window.addEventListener('blur', () => { document.body.style.filter = 'blur(25px)'; });
        window.addEventListener('focus', () => { document.body.style.filter = 'none'; });

        // CLEAN RAW 50 UNIQUE DATA RECORDS (10 TIER LEVELS x 5 CATEGORIES)
        const localPuzzles = {
            1: [
                { cat: "Sports", q: "क्रिकेट खेल में एक टीम में ______ खिलाड़ी मैदान पर होते हैं और कबड्डी में ______।", opts: ["11 / 7", "11 / 11", "9 / 7", "11 / 9"], a: "11 / 7" },
                { cat: "English", q: "The synonym of 'Happy' is ______ and the antonym of 'Sad' is ______.", opts: ["Joyful / Happy", "Angry / Cry", "Glad / Gloomy", "Smile / Bad"], a: "Joyful / Happy" },
                { cat: "GK", q: "भारत की राजधानी ______ है और मध्य प्रदेश की राजधानी ______ है।", opts: ["दिल्ली / भोपाल", "मुंबई / इंदौर", "दिल्ली / ग्वालियर", "कोलकाता / भोपाल"], a: "दिल्ली / भोपाल" },
                { cat: "Reasoning", q: "अगर कल सोमवार था, तो आने वाला कल ______ होगा और परसों ______ होगा।", opts: ["बुधवार / गुरुवार", "मंगलवार / बुधवार", "सोमवार / मंगलवार", "बुधवार / शुक्रवार"], a: "बुधवार / गुरुवार" },
                { cat: "Nature", q: "हमारे सौरमंडल का सबसे बड़ा ग्रह ______ है और सबसे छोटा ग्रह ______ है।", opts: ["बृहस्पति / बुध", "शनि / मंगल", "पृथ्वी / शुक्र", "बृहस्पति / प्लूटो"], a: "बृहस्पति / बुध" }
            ],
            2: [
                { cat: "Sports", q: "ओलंपिक छल्लों (Rings) में ______ रंग होते हैं और फुटबॉल वर्ल्ड कप हर ______ साल में होता है।", opts: ["5 / 4", "6 / 4", "5 / 3", "7 / 2"], a: "5 / 4" },
                { cat: "English", q: "Identify the vowel combo: 'B__autif__l' requires ______ and ______ to complete.", opts: ["e / u", "a / i", "e / i", "o / u"], a: "e / u" },
                { cat: "GK", q: "विश्व का सबसे बड़ा महासागर ______ है और सबसे बड़ा रेगिस्तान ______ है।", opts: ["प्रशांत / सहारा", "हिन्द / थार", "अटलांटिक / गोबी", "प्रशांत / गोबी"], a: "प्रशांत / सहारा" },
                { cat: "Reasoning", q: "Complete the pattern: 2, 4, 8, 16, ______ and 3, 6, 12, 24, ______.", opts: ["32 / 48", "24 / 36", "32 / 36", "64 / 48"], a: "32 / 48" },
                { cat: "Nature", q: "पेड़ की पत्तियां ______ के कारण हरी होती हैं और वे ______ गैस छोड़ती हैं।", opts: ["क्लोरोफिल / ऑक्सीजन", "नाइट्रोजन / कार्बन", "क्लोरोफिल / नाइट्रोजन", "पानी / ऑक्सीजन"], a: "क्लोरोफिल / ऑक्सीजन" }
            ],
            3: [
                { cat: "Sports", q: "हॉकी के जादूगर ______ को कहा जाता है और मिल्खा सिंह को ______ सिंह कहते हैं।", opts: ["मेजर ध्यानचंद / फ्लाइंग", "सचिन / सुल्तान", "ध्यानचंद / किंग", "नेहरू / आयरन"], a: "मेजर ध्यानचंद / फ्लाइंग" },
                { cat: "English", q: "Plural of 'Man' is ______ and plural of 'Child' is ______.", opts: ["Men / Children", "Mans / Childs", "Mens / Childrens", "Man / Child"], a: "Men / Children" },
                { cat: "GK", q: "सौरमंडल का सबसे गर्म ग्रह ______ है और 'नीला ग्रह' ______ को कहते हैं।", opts: ["शुक्र / पृथ्वी", "बुध / मंगल", "मंगल / शुक्र", "बृहस्पति / शनि"], a: "शुक्र / पृथ्वी" },
                { cat: "Reasoning", q: "सेब एक ______ है और आलू जमीन के अंदर उगने वाला एक ______ है।", opts: ["फल / तना", "सब्जी / जड़", "फल / फल", "बीज / तना"], a: "फल / तना" },
                { cat: "Nature", q: "शुद्ध पानी का रासायनिक सूत्र ______ है और साधारण नमक का ______ है।", opts: ["H2O / NaCl", "CO2 / HCl", "H2O / NaOH", "O2 / KOH"], a: "H2O / NaCl" }
            ],
            4: [
                { cat: "Sports", q: "आईपीएल (IPL) की शुरुआत ______ में हुई थी और पहला सीजन ______ ने जीता था।", opts: ["2008 / राजस्थान रॉयल्स", "2007 / मुंबई इंडियंस", "2009 / चेन्नई सुपर किंग्स", "2008 / डेक्कन चार्जर्स"], a: "2008 / राजस्थान रॉयल्स" },
                { cat: "English", q: "Past form of 'Eat' is ______ and its third form is ______.", opts: ["ate / eaten", "eated / eaten", "ate / eated", "eating / eats"], a: "ate / eaten" },
                { cat: "GK", q: "भारत के प्रथम प्रधानमंत्री ______ थे और प्रथम राष्ट्रपति ______ थे।", opts: ["जवाहरलाल नेहरू / डॉ. राजेंद्र प्रसाद", "महात्मा गांधी / नेहरू", "सरदार पटेल / कलाम", "शास्त्री / डॉ. राजेंद्र प्रसाद"], a: "जवाहरलाल नेहरू / डॉ. राजेंद्र प्रसाद" },
                { cat: "Reasoning", q: "यदि पैर का संबंध ______ से है, तो हाथ का संबंध ______ से होगा।", opts: ["जूते / दस्ताने", "मोज़े / घड़ी", "चप्पल / अंगूठी", "रास्ते / काम"], a: "जूते / दस्ताने" },
                { cat: "Nature", q: "ताजमहल ______ नदी के किनारे है और दिल्ली का लाल किला ______ के किनारे है।", opts: ["यमुना / यमुना", "गंगा / यमुना", "नर्मदा / ताप्ती", "यमुना / गंगा"], a: "यमुना /  यमुना" }
            ],
            5: [
                { cat: "Sports", q: "मैराथन दौड़ की कुल दूरी लगभग ______ किमी होती है और हाफ मैराथन ______ किमी।", opts: ["42 / 21", "50 / 25", "42 / 10", "30 / 15"], a: "42 / 21" },
                { cat: "English", q: "Form of 'Write': second form is ______ and third form is ______.", opts: ["wrote / written", "written / wrote", "write / wrote", "writing / writes"], a: "wrote / written" },
                { cat: "GK", q: "भारत की 'पिंक सिटी' ______ को कहा जाता है और 'झीलों की नगरी' ______ है।", opts: ["जयपुर /  उदयपुर", "जोधपुर / जयपुर", "जयपुर /  भोपाल", "इंदौर / उदयपुर"], a: "जयपुर /  उदयपुर" },
                { cat: "Reasoning", q: "यदि कार का संबंध ______ से है, तो हवाई जहाज का संबंध ______ से है।", opts: ["रोड / आसमान", "पेट्रोल / पायलट", "पहिए / पंख", "ड्राइवर / रनवे"], a: "रोड / आसमान" },
                { cat: "Nature", q: "सूर्य ग्रहण हमेशा ______ के दिन होता है और चंद्र ग्रहण ______ के दिन।", opts: ["अमावस्या / पूर्णिमा", "पूर्णिमा / अमावस्या", "रविवार / सोमवार", "अमावस्या / अमावस्या"], a: "अमावस्या / पूर्णिमा" }
            ],
            6: [
                { cat: "Sports", q: "शतरंज (Chess) बोर्ड में कुल ______ खाने होते हैं और इसमें ______ खिलाड़ी खेलते हैं।", opts: ["64 / 2", "60 / 2", "64 / 4", "32 / 2"], a: "64 / 2" },

                { cat: "Reasoning", q: "गणित में 5 का वर्ग (Square) ______ है और 10 का वर्ग ______ होता है।", opts: ["25 / 100", "20 / 40", "25 / 50", "15 / 100"], a: "25 / 100" },
                { cat: "Nature", q: "रेगिस्तान का जहाज़ ______ को कहते हैं और जंगल का राजा ______ है।", opts: ["ऊँट / शेर", "घोड़ा / चीता", "ऊँट / बाघ", "हाथी / शेर"], a: "ऊँट / शेर" }
            ],
            8: [

                { cat: "English", q: "Plural of 'Box' is ______ and plural of 'Ox' is ______.", opts: ["Boxes / Oxen", "Boxs / Oxes", "Boxes / Oxes", "Boxed / Oxen"], a: "Boxes / Oxen" },
                { cat: "GK", q: "कंप्यूटर का जनक ______ को कहा जाता है और दिमाग ______ को कहते हैं।", opts: ["चार्ल्स बैबेज / CPU", "न्यूटन / RAM", "पास्कल / हार्डडिस्क", "एडिसन / CPU"], a: "चार्ल्स बैबेज / CPU" },
                { cat: "Reasoning", q: "जनवरी के ठीक बाद ______ आता है और अक्टूबर के ठीक पहले ______ आता है।", opts: ["फरवरी / सितंबर", "मार्च / नवंबर", "फरवरी / अगस्त", "दिसंबर / नवंबर"], a: "फरवरी / सितंबर" },
                { cat: "Nature", q: "दुनिया का सबसे बड़ा फूल ______ है और सबसे छोटा पौधा ______ श्रेणी का है।", opts: ["रेफ्लेसिया / वोल्फिया", "गुलाब / कैक्टस", "कमल / काई", "सूरजमुखी / तुलसी"], a: "रेफ्लेसिया / वोल्फिया" }
            ],
            9: [
                { cat: "Sports", q: "भारत ने पहला क्रिकेट वर्ल्ड कप ______ में जीता और दूसरा वनडे वर्ल्ड कप ______ में।", opts: ["1983 / 2011", "1983 / 2007", "1975 / 2011", "1999 / 2015"], a: "1983 / 2011" },
                { cat: "English", q: "Synonym of 'Smart' is ______ and antonym of 'Fast' is ______.", opts: ["Intelligent / Slow", "Clever / Quick", "Dull / Slow", "Brilliant / Run"], a: "Intelligent / Slow" },
                { cat: "GK", q: "Gate of India ______ में है और 'इंडिया गेट' ______ शहर में स्थित है।", opts: ["मुंबई / दिल्ली", "दिल्ली / मुंबई", "मुंबई / कोलकाता", "चेन्नई / दिल्ली"], a: "मुंबई / दिल्ली" },
                { cat: "Reasoning", q: "रिश्तों में माता के भाई को ______ कहते हैं और पिता के भाई को ______ कहते हैं।", opts: ["मामा / चाचा", "चाचा / मामा", "मौसा / ताऊ", "मामा / फूफा"], a: "मामा / चाचा" },
                { cat: "Nature", q: "सूर्य ग्रहण हमेशा ______ के दिन होता है और चंद्र ग्रहण ______ के दिन।", opts: ["अmawasya / पूर्णिमा", "पूर्णिमा / अमावस्या", "मंगल / सूर्य", "सूर्य / सीरियस"], a: "अmawasya / पूर्णिमा" }
            ],
            10: [
                { cat: "Sports", q: "फीफा (FIFA) का संबंध ______ से है और आईसीसी (ICC) का संबंध ______ से है।", opts: ["फुटबॉल / क्रिकेट", "क्रिकेट / फुटबॉल", "टेनिस / हॉकी", "फुटबॉल / टेनिस"], a: "फुटबॉल / क्रिकेट" },
                { cat: "English", q: "Grammar fill: 'He ______ to school' and 'They ______ to school' every day.", opts: ["goes / go", "go / goes", "going / go", "gone / goes"], a: "goes / go" },
                { cat: "GK", q: "भारत की सबसे लंबी नदी ______ है और सबसे चौड़ी नदी ______ है।", opts: ["गंगा / ब्रह्मपुत्र", "यमुना / गंगा", "गोदावरी / सिंधु", "गंगा / नर्मदा"], a: "गंगा / ब्रह्मपुत्र" },
                { cat: "Reasoning", q: "यदि रात का उल्टा ______ है, तो सुबह का उल्टा ______ होगा।", opts: ["दिन / शाम", "अंधेरा / उजाला", "दिन / रात", "दोपहर / शाम"], a: "दिन / शाम" },
                { cat: "Nature", q: "ओजोन परत हमें ______ किरणों से बचाती है और यह ______ मंडल में पाई जाती है।", opts: ["पराबैंगनी / समताप", "इन्फ्रारेड / क्षोभ", "एक्स-रे / आयन", "पराबैंगनी / बाह्य"], a: "पराबैंगनी / समताप" }
            ]
        };

        const categories = ["Sports", "English", "GK", "Reasoning", "Nature"];
        
        let currentLvl = 1; let currentQuestIdx = 0; 
        let clickAttempts = 0; let puzzleSolved = false;
        let pName = "Player 1"; let timerInterval = null; let ticksLeft = 15;

        const quoteText = document.getElementById('puzzle-quote-text');
        const optionsContainer = document.getElementById('options-container');
        const attemptTracker = document.getElementById('attempt-tracker');
        const captureArea = document.getElementById('capture-node');
        const expFill = document.getElementById('exp-fill');
        const expText = document.getElementById('exp-text');
        const lvlTag = document.getElementById('lvl-tag');
        const lvlDisplay = document.getElementById('lvl-display');
        const lvlSplash = document.getElementById('lvl-splash');
        const timerContainer = document.getElementById('timer-container');
        const timerFill = document.getElementById('timer-fill');

        function initPlayerSession() {
            try {
                const input = document.getElementById('username-field').value.trim();
                if (!input) { alert("कृपया एक सुंदर सा नाम दर्ज करें!"); return; }
                pName = input;
                document.getElementById('player-display-name').innerText = pName;
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-gameboard').style.display = 'block';
                resizeCanvas();
                loadLevelQuest();
            } catch(err) {
                alert("Session Initialization Error: " + err.message);
            }
        }

        function runArcadeTimer() {
            clearInterval(timerInterval);
            if (currentLvl === 1) { timerContainer.style.display = 'none'; return; }
            
            timerContainer.style.display = 'block';
            ticksLeft = 15; timerFill.style.width = '100%';

            timerInterval = setInterval(() => {
                ticksLeft--;
                timerFill.style.width = `${(ticksLeft / 15) * 100}%`;
                if (ticksLeft <= 0) {
                    clearInterval(timerInterval);
                    puzzleSolved = true;
                    quoteText.style.color = 'var(--game-red)';
                    quoteText.innerText = "💥 TIME EXPIRED! QUEST FAILED!";
                    updateXP(5, 'lose');
                    lockAllOptionsButtons();
                }
            }, 1000);
        }

        function loadLevelQuest() {
            try {
                clearInterval(timerInterval);
                puzzleSolved = false; clickAttempts = 0;
                quoteText.style.color = '#f8fafc';
                attemptTracker.innerText = "Lifelines: 2";
                
                const activeCat = categories[currentQuestIdx];
                document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
                
                const activeBtn = document.getElementById(`cat-${activeCat.toLowerCase()}`);
                if (activeBtn) activeBtn.classList.add('active');
                
                document.getElementById('quest-track-label').innerText = `QUEST: ${currentQuestIdx + 1} / 5`;
                lvlTag.innerText = `LEVEL ${currentLvl}`;
                lvlDisplay.innerText = `LVL ${currentLvl}`;

                const qData = localPuzzles[currentLvl][currentQuestIdx];
                if (!qData) {
                    quoteText.innerText = "Fatal Engine Mismatch Error."; return;
                }

                let htmlString = qData.q.replace("______", `<span class="blank-space">______</span>`);
                htmlString = htmlString.replace("______", `<span class="blank-space">______</span>`);
                quoteText.innerHTML = htmlString;

                optionsContainer.innerHTML = '';
                let rawOptions = [...qData.opts];
                if (currentLvl > 1) {
                    rawOptions.sort(() => Math.random() - 0.5); runArcadeTimer();
                } else {
                    timerContainer.style.display = 'none';
                }

                rawOptions.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.classList.add('puzzle-opt-btn');
                    btn.innerHTML = `<span>🎮 ${opt}</span>`;
                    btn.addEventListener('click', () => evaluateChoice(btn, opt, qData.a));
                    optionsContainer.appendChild(btn);
                });
            } catch(e) {
                quoteText.innerText = "Runtime UI Fetch Error: " + e.message;
            }
        }

        function evaluateChoice(element, choice, correctValue) {
            if (puzzleSolved || clickAttempts >= 2) return;
            clickAttempts++;
            attemptTracker.innerText = `Lifelines: ${2 - clickAttempts}`;

            if (choice === correctValue) {
                clearInterval(timerInterval);
                puzzleSolved = true;
                element.classList.add('correct');
                element.innerHTML += ` <span>✅ +10 XP</span>`;

                const words = correctValue.split(' / ');
                let solvedHtml = localPuzzles[currentLvl][currentQuestIdx].q.replace("______", `<span style="color:var(--game-green)">${words[0]}</span>`);
                solvedHtml = solvedHtml.replace("______", `<span style="color:var(--game-green)">${words[1]}</span>`);
                quoteText.innerHTML = solvedHtml;

                createConfetti(element.getBoundingClientRect().left + 40, element.getBoundingClientRect().top);
                updateXP(10, 'gain'); lockAllOptionsButtons();
            } else {
                element.classList.add('wrong'); updateXP(5, 'lose');

                if (currentLvl > 1 && clickAttempts < 2) {
                    setTimeout(() => {
                        const btns = Array.from(optionsContainer.children).sort(() => Math.random() - 0.5);
                        optionsContainer.innerHTML = '';
                        btns.forEach(b => optionsContainer.appendChild(b));
                    }, 400);
                }

                if (clickAttempts >= 2) {
                    clearInterval(timerInterval); puzzleSolved = true;
                    attemptTracker.innerText = "CRITICAL FAIL 💀"; lockAllOptionsButtons();
                }
            }
        }

        function lockAllOptionsButtons() {
            Array.from(optionsContainer.children).forEach(btn => btn.style.pointerEvents = 'none');
        }

        function updateXP(amount, direction) {
            let fillPercent = parseInt(expFill.style.width) || 0;
            if (direction === 'gain') fillPercent += amount;
            else fillPercent = Math.max(0, fillPercent - amount);

            if (fillPercent >= 100) {
                fillPercent = 0;
                if (currentQuestIdx >= 4) {
                    if (currentLvl < 10) {
                        currentLvl++; currentQuestIdx = 0; triggerLevelUpBanner();
                    } else {
                        alert("🎉 CONGRATULATIONS! REALM CONQUERED!");
                    }
                }
            }
            expFill.style.width = `${fillPercent}%`;
            expText.innerText = `${fillPercent}/100 XP`;
        }

        function triggerLevelUpBanner() {
            lvlSplash.innerText = `LEVEL UP! LEVEL ${currentLvl} ⚡`;
            lvlSplash.classList.add('show');
            createConfetti(window.innerWidth/2, window.innerHeight/2);
            setTimeout(() => {
                lvlSplash.classList.remove('show'); loadLevelQuest();
            }, 1800);
        }

        document.getElementById('next-quote-btn').addEventListener('click', () => {
            if (currentQuestIdx < 4) { currentQuestIdx++; loadLevelQuest(); } 
            else if (currentLvl < 10) { currentLvl++; currentQuestIdx = 0; triggerLevelUpBanner(); }
        });

        document.getElementById('download-btn').addEventListener('click', () => {
            if (!puzzleSolved) { alert("🔒 पहेली हल करने के बाद ही कार्ड का स्क्रीनशॉट सेव कर सकते हैं!"); return; }
            const btn = document.getElementById('download-btn'); btn.innerText = "SAVING...";
            html2canvas(captureArea, { scale: 3, backgroundColor: null, useCORS: true }).then(canvas => {
                const link = document.createElement('a'); link.download = `Solved-Level-${currentLvl}.png`;
                link.href = canvas.toDataURL("image/png"); link.click(); btn.innerHTML = "📸 Save Card";
            });
        });

        document.getElementById('ping-me').addEventListener('click', (e) => {
            createConfetti(e.clientX, e.clientY);
            setTimeout(() => { window.open('https://instagram.com/YOUR_USERNAME', '_blank'); }, 500);
        });

        // Backward For-loop Particles
        const canvas = document.getElementById('particle-canvas'); const ctx = canvas.getContext('2d'); let particles = [];
        function resizeCanvas() { if(canvas) { canvas.width = window.innerWidth; canvas.height = window.innerHeight; } }
        window.addEventListener('resize', resizeCanvas);
        class Particle {
            constructor(x, y) { this.x = x; this.y = y; this.size = Math.random() * 3 + 1.5; this.speedX = (Math.random() - 0.5) * 2; this.speedY = (Math.random() - 0.5) * 2; this.alpha = 1; }
            update() { this.x += this.speedX; this.y += this.speedY; this.alpha -= 0.02; }
            draw() { ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = '#a855f7'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
        }
        function handleMove(e) { const x = e.touches ? e.touches[0].clientX : e.clientX; const y = e.touches ? e.touches[0].clientY : e.clientY; particles.push(new Particle(x, y)); }
        window.addEventListener('mousemove', handleMove); window.addEventListener('touchmove', handleMove);
        
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        function createConfetti(x, y) {
            const colors = ['#a855f7', '#ec4899', '#22c55e', '#3b82f6'];
            for(let i=0; i<25; i++) {
                const confetti = document.createElement('div'); confetti.classList.add('confetti'); document.body.appendChild(confetti);
                confetti.style.left = x + 'px'; confetti.style.top = y + 'px'; confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.setProperty('--x', (Math.random() - 0.5) * 200 + 'px'); confetti.style.setProperty('--y', (Math.random() - 0.5) * 200 + 'px');
                setTimeout(() => confetti.remove(), 800);
            }
        }
    </script>
</body>
