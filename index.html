<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Creative Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --accent-color: #818cf8;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 20px; overflow-x: hidden;
            transition: background 1s ease;
        }

        /* Ambient Background */
        .glow-sphere {
            position: absolute; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: 10%; left: -10%; z-index: 0;
            animation: float 8s infinite alternate ease-in-out;
        }
        .glow-sphere-2 {
            position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.1) 0%, rgba(0,0,0,0) 70%);
            bottom: 5%; right: -10%; z-index: 0;
            animation: float 12s infinite alternate-reverse ease-in-out;
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(30px) scale(1.1); }
        }

        .container {
            width: 100%; max-width: 450px; z-index: 10;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Profile Card */
        .profile-card { text-align: center; margin-bottom: 25px; }
        .avatar-container { position: relative; width: 100px; height: 100px; margin: 0 auto 15px; }
        .avatar {
            width: 100%; height: 100%; border-radius: 50%;
            border: 3px solid var(--accent-color); padding: 3px; object-fit: cover;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.3); transition: transform 0.5s ease;
        }
        .avatar-container:hover .avatar { transform: rotate(360deg) scale(1.05); }
        .profile-card h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; margin-bottom: 5px; }
        .profile-card p { color: #94a3b8; font-size: 0.9rem; }

        /* Widgets */
        .widget {
            background: var(--card-bg); border: 1px solid var(--card-border);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-radius: 24px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .widget-title {
            font-family: 'Space Grotesk', sans-serif; font-size: 1rem;
            margin-bottom: 15px; color: #cbd5e1; text-transform: uppercase;
            letter-spacing: 1px; display: flex; align-items: center; gap: 8px;
        }

        /* Mood Grid */
        .mood-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .mood-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--card-border);
            border-radius: 16px; padding: 12px 5px; font-size: 1.3rem; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .mood-btn span { font-size: 0.7rem; font-weight: 500; color: #94a3b8; }
        .mood-btn:hover { transform: scale(1.1); background: rgba(255, 255, 255, 0.1); }
        .mood-btn.active {
            background: var(--accent-color); border-color: transparent; transform: scale(1.05);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }
        .mood-btn.active span { color: #fff; }

        /* --- BEAUTIFUL STORY-READY QUOTE BOX --- */
        .quote-capture-area {
            background: linear-gradient(135deg, #1e1b4b 0%, #2e1065 100%);
            border-radius: 18px; padding: 25px 20px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.02);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 120px; transition: background 0.5s ease;
        }

        .quote-box {
            font-style: italic; color: #f8fafc; font-size: 1rem;
            line-height: 1.6; font-weight: 500; transition: opacity 0.3s ease;
            margin-bottom: 10px; text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .quote-author {
            font-size: 0.75rem; color: #a78bfa; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* Quote Actions Container */
        .quote-actions { display: flex; gap: 10px; margin-top: 15px; width: 100%; }

        .action-sub-btn {
            flex: 1; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #cbd5e1; padding: 10px; font-size: 0.8rem; border-radius: 14px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            gap: 6px; font-weight: 500; transition: all 0.2s ease;
        }

        .action-sub-btn:hover { background: rgba(255, 255, 255, 0.15); color: white; transform: translateY(-1px); }

        /* Universe Grid */
        .universe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .uni-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--card-border);
            border-radius: 16px; padding: 15px; text-decoration: none; color: white;
            display: flex; flex-direction: column; gap: 8px; transition: all 0.3s ease;
        }
        .uni-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.08); }
        .uni-icon { font-size: 1.5rem; }
        .uni-card h4 { font-size: 0.95rem; font-weight: 500; }
        .uni-card p { font-size: 0.75rem; color: #94a3b8; }

        /* Main CTA Button */
        .ping-btn {
            width: 100%; background: linear-gradient(90deg, #6366f1, #ec4899); border: none;
            padding: 16px; border-radius: 16px; color: white; font-weight: 600; font-size: 1rem;
            cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px;
            box-shadow: 0 4px 20px rgba(236, 72, 153, 0.3); transition: all 0.3s ease;
        }
        .ping-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(236, 72, 153, 0.5); }

        .confetti { position: absolute; width: 8px; height: 8px; z-index: 1000; border-radius: 50%; animation: poof 0.8s ease-out forwards; pointer-events: none; }
        @keyframes poof { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; } }
    </style>
</head>
<body>

    <div class="glow-sphere"></div>
    <div class="glow-sphere-2"></div>

    <div class="container">
        
        <div class="profile-card">
            <div class="avatar-container">
                <img src="my_photo.jpg" alt="Profile" class="avatar">
            </div>
            <h1>Hey, I'm Rohit 👋</h1>
            <p>Creating things on the internet</p>
        </div>

        <div class="widget">
            <div class="widget-title">🔮 How's the vibe today?</div>
            <div class="mood-grid">
                <button class="mood-btn active" data-mood="wisdom" data-color="linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%)" data-box-bg="linear-gradient(135deg, #1e1b4b 0%, #2e1065 100%)">
                    🧠 <span>Wisdom</span>
                </button>
                <button class="mood-btn" data-mood="motivational" data-color="linear-gradient(135deg, #111827 0%, #311042 100%)" data-box-bg="linear-gradient(135deg, #3b0764 0%, #581c87 100%)">
                    🚀 <span>Grind</span>
                </button>
                <button class="mood-btn" data-mood="creativity" data-color="linear-gradient(135deg, #070f1e 0%, #0c3e3f 100%)" data-box-bg="linear-gradient(135deg, #064e3b 0%, #0f766e 100%)">
                    🎨 <span>Inspire</span>
                </button>
                <button class="mood-btn" data-mood="life" data-color="linear-gradient(135deg, #1c1917 0%, #0f172a 100%)" data-box-bg="linear-gradient(135deg, #1c1917 0%, #44403c 100%)">
                    🍃 <span>Life</span>
                </button>
            </div>
            
            <div class="quote-capture-area" id="capture-node">
                <div class="quote-box" id="quote-text">Fetching fresh vibe...</div>
                <div class="quote-author" id="quote-author">~ Loading</div>
            </div>

            <div class="quote-actions">
                <button class="action-sub-btn" id="next-quote-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                    Another One
                </button>
                <button class="action-sub-btn" id="download-btn" style="border-color: rgba(236, 72, 153, 0.4); color: #f472b6;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4M7 10l5 5 5-5M12 15V3"/></svg>
                    Save for Story
                </button>
            </div>
        </div>

        <div class="widget">
            <div class="widget-title">✨ My Universe</div>
            <div class="universe-grid">
                <a href="#" class="uni-card" target="_blank">
                    <div class="uni-icon">🎬</div>
                    <h4>Animation Hub</h4>
                    <p>3D Stories & Magic</p>
                </a>
                <a href="#" class="uni-card" target="_blank">
                    <div class="uni-icon">💻</div>
                    <h4>Dev Lab</h4>
                    <p>Cool Tech Projects</p>
                </a>
                <a href="#" class="uni-card" target="_blank">
                    <div class="uni-icon">☕</div>
                    <h4>Hey Mama Cafe</h4>
                    <p>Live Web App Site</p>
                </a>
                <a href="#" class="uni-card" target="_blank">
                    <div class="uni-icon">🎵</div>
                    <h4>Vibe Playlist</h4>
                    <p>What I listen to</p>
                </a>
            </div>
        </div>

        <button class="ping-btn" id="ping-me">🚀 Ping Me on Instagram</button>

    </div>

    <script>
        // Local Ultra-Database (Bina Internet Ke Chalega, Unlimited Variations)
        const localQuotes = {
            wisdom: [
                "“The only true wisdom is in knowing you know nothing.” — Socrates",
                "“Yesterday I was clever, so I wanted to change the world. Today I am wise, so I am changing myself.” — Rumi",
                "“The simple things are also the most extraordinary things.” — Paulo Coelho",
                "“Knowledge speaks, but wisdom listens.” — Jimi Hendrix",
                "“Time moves in one direction, memory in another.” — William Gibson",
                "“Quiet people have the loudest minds.” — Stephen Hawking",
                "“The measure of intelligence is the ability to change.” — Albert Einstein",
                "“Turn your wounds into wisdom.” — Oprah Winfrey"
            ],
            motivational: [
                "“Hustle until your haters ask if you're hiring.” — Unknown",
                "“The only way to do great work is to love what you do.” — Steve Jobs",
                "“Don't count the days, make the days count.” — Muhammad Ali",
                "“Great things never come from comfort zones.” — Unknown",
                "“Push yourself, because no one else is going to do it for you.” — Unknown",
                "“Your limitation—it's only your imagination.” — Unknown",
                "“Success doesn't just find you. You have to go out and get it.” — Unknown",
                "“Dream it. Wish it. Do it.” — Unknown",
                "“Action is the foundational key to all success.” — Pablo Picasso"
            ],
            creativity: [
                "“Creativity is intelligence having fun.” — Albert Einstein",
                "“Every child is an artist. The problem is how to remain an artist once we grow up.” — Pablo Picasso",
                "“You can't use up creativity. The more you use, the more you have.” — Maya Angelou",
                "“Art is not what you see, but what you make others see.” — Edgar Degas",
                "“Make it simple, but significant.” — Don Draper",
                "“Creativity takes courage.” — Henri Matisse",
                "“To live a creative life, we must lose our fear of being wrong.” — Joseph Chilton Pearce",
                "“The essential part of creativity is not being afraid to fail.” — Edwin Land"
            ],
            life: [
                "“Life is short, time is fast. No replay, no rewind. Enjoy every moment.” — Unknown",
                "“Do not let making a living prevent you from making a life.” — John Wooden",
                "“In the end, it's not the years in your life that count. It's the life in your years.” — Abraham Lincoln",
                "“Life is what happens when you're busy making other plans.” — John Lennon",
                "“Live as if you were to die tomorrow. Learn as if you were to live forever.” — Mahatma Gandhi",
                "“Good clean code is the best reflection of a clear mind.” — Developer Vibe",
                "“Life is 10% what happens to us and 90% how we react to it.” — Charles R. Swindoll",
                "“Keep close to Nature's heart... and break clear away, once in a while.” — John Muir"
            ]
        };

        let currentTag = 'wisdom'; 
        let lastIndices = { wisdom: -1, motivational: -1, creativity: -1, life: -1 };

        const quoteText = document.getElementById('quote-text');
        const quoteAuthor = document.getElementById('quote-author');
        const captureArea = document.getElementById('capture-node');

        // Logic to pick a completely random quote without immediate repetition
        function displayLocalQuote() {
            quoteText.style.opacity = 0;
            quoteAuthor.style.opacity = 0;
            
            setTimeout(() => {
                const quotesArray = localQuotes[currentTag];
                let randomIndex = Math.floor(Math.random() * quotesArray.length);
                
                // loop taaki lagatar click karne par same quote dobara na aaye
                while (randomIndex === lastIndices[currentTag] && quotesArray.length > 1) {
                    randomIndex = Math.floor(Math.random() * quotesArray.length);
                }
                
                lastIndices[currentTag] = randomIndex;
                
                const fullQuote = quotesArray[randomIndex];
                // Quote aur Author ko alag karne ka logic (Splitting by " — ")
                const parts = fullQuote.split(' — ');
                
                quoteText.innerText = parts[0];
                quoteAuthor.innerText = parts[1] ? `~ ${parts[1]}` : '~ Vibe';
                
                quoteText.style.opacity = 1;
                quoteAuthor.style.opacity = 1;
            }, 200);
        }

        // Mood Buttons Click Handler
        document.querySelectorAll('.mood-btn').forEach(button => {
            button.addEventListener('click', () => {
                document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                
                currentTag = button.getAttribute('data-mood');
                document.body.style.background = button.getAttribute('data-color');
                captureArea.style.background = button.getAttribute('data-box-bg');
                
                displayLocalQuote();
            });
        });

        // "Another One" click action
        document.getElementById('next-quote-btn').addEventListener('click', () => {
            const svg = document.querySelector('#next-quote-btn svg');
            svg.style.transform = 'rotate(360deg)';
            setTimeout(() => svg.style.transform = 'rotate(0deg)', 400);
            displayLocalQuote();
        });

        // Initialize First Quote
        displayLocalQuote();

        // SCREENSHOT GENERATOR (HTML to PNG)
        document.getElementById('download-btn').addEventListener('click', () => {
            const btn = document.getElementById('download-btn');
            btn.innerText = "Generating Card...";

            html2canvas(captureArea, {
                scale: 3, 
                backgroundColor: null, 
                logging: false,
                useCORS: true
            }).then(canvas => {
                const image = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.download = `Vibe-Quote-${currentTag}.png`;
                link.href = image;
                link.click();
                btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4M7 10l5 5 5-5M12 15V3"/></svg> Save for Story`;
            }).catch(err => {
                btn.innerText = "Error Saving!";
                setTimeout(() => { btn.innerText = "Save for Story"; }, 2000);
            });
        });

        // Confetti Blast Effect on Instagram Button
        document.getElementById('ping-me').addEventListener('click', (e) => {
            createConfetti(e.clientX, e.clientY);
            setTimeout(() => { window.open('https://instagram.com/YOUR_USERNAME', '_blank'); }, 500);
        });

        function createConfetti(x, y) {
            const colors = ['#6366f1', '#ec4899', '#3b82f6', '#10b981', '#f59e0b'];
            for(let i=0; i<30; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                document.body.appendChild(confetti);
                const xForce = (Math.random() - 0.5) * 250;
                const yForce = (Math.random() - 0.5) * 250;
                confetti.style.left = x + 'px'; confetti.style.top = y + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.setProperty('--x', xForce + 'px');
                confetti.style.setProperty('--y', yForce + 'px');
                setTimeout(() => confetti.remove(), 800);
            }
        }
    </script>
</body>
</html>
