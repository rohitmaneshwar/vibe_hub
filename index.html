<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Play Rohit's Ultimate Trivia Game! 10 Levels of secure brain challenges with a live leaderboard.">
    <title>Rohit's Arcade - Trivia Realm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="particle-canvas"></canvas>
    <audio id="lofi-player" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <div class="level-up-splash" id="lvl-splash">LEVEL UP! ⚡</div>

    <div id="login-overlay">
        <div class="login-card">
            <h2>Trivia Dungeon 🎮</h2>
            <p>अपना नाम डालें और 10 Levels की पहेली को स्टार्ट करें</p>
            <input type="text" id="username-field" class="name-input" placeholder="Enter Avatar Name..." maxlength="12">
            <button class="start-game-btn" onclick="initPlayerSession()">Launch Game</button>
        </div>
    </div>

    <div class="container" id="main-gameboard">
        
        <div class="hud-bar">
            <div class="live-status"><div class="pulse-dot"></div><span id="live-greeting">SYS: ONLINE</span></div>
            <div class="hud-level-tag" id="lvl-tag">LEVEL 1</div>
        </div>
        
        <div class="profile-card">
            <img src="my_photo.jpg" alt="Avatar" class="avatar" id="profile-img">
            <div class="char-stats">
                <h1 id="player-display-name">Player</h1>
                <div style="display: flex; justify-content: space-between; font-size: 0.6rem; font-weight: 700; color: #a0aec0; margin-top: 5px;">
                    <span id="quest-track-label">QUEST: 1 / 5</span>
                    <span id="exp-text">0/100 XP</span>
                </div>
                <div class="stat-bar-container"><div class="stat-bar-fill" id="exp-fill"></div></div>
            </div>
        </div>

        <div id="timer-container"><div id="timer-fill"></div></div>

        <div class="category-matrix">
            <div class="cat-btn" id="cat-sports">⚽<span>Sports</span></div>
            <div class="cat-btn" id="cat-english">🔤<span>English</span></div>
            <div class="cat-btn" id="cat-gk">🌍<span>GK</span></div>
            <div class="cat-btn" id="cat-reasoning">🧠<span>Logic</span></div>
            <div class="cat-btn" id="cat-nature">🍃<span>Nature</span></div>
        </div>

        <div class="widget">
            <div class="widget-title">
                <span>🛡️ Challenge Quest</span>
                <span class="attempt-badge" id="attempt-tracker">Lifelines: 2</span>
            </div>
            
            <div class="quote-capture-area" id="capture-node">
                <div class="quote-box" id="puzzle-quote-text">Dungeon Initializing...</div>
                <div class="quote-author" style="display:none;"></div>
            </div>

            <div class="puzzle-options-box" id="options-container"></div>

            <div class="quote-actions">
                <button class="action-sub-btn" id="next-quote-btn">🔄 Restart Quest</button>
                <button class="action-sub-btn" id="download-btn" style="border-color: rgba(236,72,153,0.4); color:#f472b6;">📸 Save Card</button>
            </div>
        </div>

        <div class="widget leaderboard-widget">
            <div class="widget-title">🏆 Dungeon Hall of Fame</div>
            <div class="leaderboard-list" id="leaderboard-container">
                </div>
        </div>

        <button class="ping-btn" id="ping-me">⚡ Claim Realm Reward</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
